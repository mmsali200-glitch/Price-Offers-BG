<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستخرج عروض الأسعار</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>📄 مستخرج عروض الأسعار</h1>
        <p class="subtitle">استخراج البيانات من عروض الأسعار تلقائياً</p>
    </header>

    <main>
        <section class="input-section">
            <div class="tabs">
                <button class="tab-btn active" data-tab="text">📝 إدخال نصي</button>
                <button class="tab-btn" data-tab="file">📎 رفع ملف</button>
            </div>

            <div class="tab-content active" id="tab-text">
                <label for="quoteText">الصق نص عرض السعر هنا:</label>
                <textarea id="quoteText" rows="12" placeholder="مثال:&#10;عرض سعر رقم: 2024-001&#10;التاريخ: 2024-01-15&#10;العميل: شركة المثال&#10;&#10;1. جهاز كمبيوتر     الكمية: 5     السعر: 1500&#10;2. طابعة ليزر       الكمية: 2     السعر: 800&#10;&#10;المجموع: 9100"></textarea>
            </div>

            <div class="tab-content" id="tab-file">
                <label for="fileInput" class="file-label">
                    <span>اختر ملف نصي أو اسحبه هنا</span>
                    <input type="file" id="fileInput" accept=".txt,.csv">
                </label>
                <p class="file-name" id="fileName"></p>
            </div>

            <div class="buttons">
                <button id="extractBtn" class="primary-btn">🔍 استخراج البيانات</button>
                <button id="clearBtn" class="secondary-btn">🗑️ مسح</button>
                <button id="sampleBtn" class="secondary-btn">📋 نص تجريبي</button>
            </div>
        </section>

        <section class="output-section" id="outputSection" style="display:none;">
            <h2>📊 البيانات المستخرجة</h2>

            <div class="info-grid">
                <div class="info-card">
                    <label>رقم العرض</label>
                    <div class="info-value" id="quoteNumber">-</div>
                </div>
                <div class="info-card">
                    <label>التاريخ</label>
                    <div class="info-value" id="quoteDate">-</div>
                </div>
                <div class="info-card">
                    <label>العميل</label>
                    <div class="info-value" id="quoteClient">-</div>
                </div>
                <div class="info-card">
                    <label>المورد</label>
                    <div class="info-value" id="quoteSupplier">-</div>
                </div>
            </div>

            <h3>📦 الأصناف</h3>
            <div class="table-wrapper">
                <table id="itemsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>الوصف</th>
                            <th>الكمية</th>
                            <th>سعر الوحدة</th>
                            <th>الإجمالي</th>
                        </tr>
                    </thead>
                    <tbody id="itemsBody"></tbody>
                </table>
            </div>

            <div class="totals">
                <div class="total-row">
                    <span>المجموع الفرعي:</span>
                    <span id="subtotal">0.00</span>
                </div>
                <div class="total-row">
                    <span>الضريبة:</span>
                    <span id="tax">0.00</span>
                </div>
                <div class="total-row total-final">
                    <span>الإجمالي النهائي:</span>
                    <span id="grandTotal">0.00</span>
                </div>
            </div>

            <div class="export-buttons">
                <button id="exportJsonBtn" class="primary-btn">💾 تصدير JSON</button>
                <button id="exportCsvBtn" class="primary-btn">📊 تصدير CSV</button>
                <button id="printBtn" class="secondary-btn">🖨️ طباعة</button>
            </div>
        </section>
    </main>

    <footer>
        <p>مستخرج عروض الأسعار - يعمل محلياً في المتصفح</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
